services:
  shard0:
    build: .
    container_name: epochdb-shard0
    ports:
      - "8081:8080"
    environment:
      - NODE_MODE=shard
      - STORAGE_DIR=/data
      - INTERNAL_AUTH_TOKEN=test-internal-token-67890
    volumes:
      - shard0_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  shard1:
    build: .
    container_name: epochdb-shard1
    ports:
      - "8082:8080"
    environment:
      - NODE_MODE=shard
      - STORAGE_DIR=/data
      - INTERNAL_AUTH_TOKEN=test-internal-token-67890
    volumes:
      - shard1_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  shard2:
    build: .
    container_name: epochdb-shard2
    ports:
      - "8083:8080"
    environment:
      - NODE_MODE=shard
      - STORAGE_DIR=/data
      - INTERNAL_AUTH_TOKEN=test-internal-token-67890
    volumes:
      - shard2_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  coordinator:
    build: .
    container_name: epochdb-coordinator
    ports:
      - "8080:8080"
    environment:
      - NODE_MODE=coordinator
      - SHARD_NODES=http://shard0:8080,http://shard1:8080,http://shard2:8080
      - API_KEY=test-api-key-12345
      - INTERNAL_AUTH_TOKEN=test-internal-token-67890
    depends_on:
      - shard0
      - shard1
      - shard2
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

volumes:
  shard0_data:
  shard1_data:
  shard2_data:
